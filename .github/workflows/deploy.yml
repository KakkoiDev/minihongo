name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download audio from release
        run: |
          mkdir -p audio
          gh release download audio-v1 --pattern '*.tar.gz' --dir /tmp
          tar xzf /tmp/minihongo-audio-v1.tar.gz -C audio/
        env:
          GH_TOKEN: ${{ github.token }}

      - run: python generate_pages.py && python site/build.py
        env:
          BASE_URL: /

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
