<!doctype html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="{{BASE_URL}}">
  <title><slot name="title">Minihongo</slot></title>
  <!-- Render-blocking: apply saved preferences before first paint to prevent flicker -->
  <script>
    // Restore theme (dark/light) from localStorage or system preference
    const t = localStorage.getItem('theme') ??
      (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
    document.documentElement.dataset.theme = t
    const tc = document.querySelector('meta[name="theme-color"]')
    if (tc) tc.content = t === 'dark' ? '#1A1A1A' : '#FFFFFF'

    // Restore furigana visibility preference
    if (localStorage.getItem('furigana') === '0')
      document.documentElement.classList.add('no-furigana')

    // Redirect to stored language if user is on the wrong locale path
    const savedLang = localStorage.getItem('lang')
    if (savedLang && /^(en|ja|mh)$/.test(savedLang)) {
      const curLang = location.pathname.startsWith('/mh/') ? 'mh'
        : location.pathname.startsWith('/ja/') ? 'ja' : 'en'
      if (savedLang !== curLang) {
        const pg = location.pathname.replace(/^\/(ja|mh)\//, '/')
        location.replace(savedLang === 'en' ? pg : `/${savedLang}${pg}`)
      }
    }
  </script>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap"></noscript>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <nav>
    <a href="./" class="logo" lang="ja">ミニ本語</a>
    <a href="lessons/vocabulary.html">{{NAV_VOCABULARY}}</a>
    <a href="lessons/grammar.html">{{NAV_GRAMMAR}}</a>
    <a href="lessons/word-building.html">{{NAV_WORD_BUILDING}}</a>
    <a href="lessons/texts-dialogs.html">{{NAV_READING}}</a>
    <button class="nav-toggle" id="btn-furigana">{{FURIGANA_LABEL}}</button>
    <button class="nav-toggle" id="btn-theme">{{DARK_MODE_LABEL}}</button>
    {{LANG_SWITCHER}}
  </nav>

  <div id="toast-container"></div>

  <main id="content">
    <slot></slot>
  </main>

  <button class="back-to-top" id="btn-top" aria-label="Back to top">&uarr;</button>

  <footer>
    <a href="https://github.com/KakkoiDev/minihongo">GitHub</a>
    <span>&copy; {{COPYRIGHT_YEAR}} KakkoiDev</span>
  </footer>

  <!-- Toast strings (build-time injected, needed before app.js) -->
  <script>
    const TOAST = {
      offline: '{{TOAST_OFFLINE}}',
      online: '{{TOAST_ONLINE}}',
      install: '{{TOAST_INSTALL}}',
      installBtn: '{{TOAST_INSTALL_BTN}}',
      updated: '{{TOAST_UPDATED}}'
    }
  </script>
  <script src="/static/app.js" defer></script>
</body>
</html>
