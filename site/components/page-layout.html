<!doctype html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="{{BASE_URL}}">
  <title><slot name="title">Minihongo</slot></title>
  <!-- Render-blocking: apply saved preferences before first paint to prevent flicker -->
  <script>
    // Restore theme (dark/light) from localStorage or system preference
    const t = localStorage.getItem('theme') ??
      (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
    document.documentElement.dataset.theme = t

    // Restore furigana visibility preference
    if (localStorage.getItem('furigana') === '0')
      document.documentElement.classList.add('no-furigana')

    // Redirect to stored language if user is on the wrong locale path
    const savedLang = localStorage.getItem('lang')
    if (savedLang && /^(en|ja|mh)$/.test(savedLang)) {
      const curLang = location.pathname.startsWith('/mh/') ? 'mh'
        : location.pathname.startsWith('/ja/') ? 'ja' : 'en'
      if (savedLang !== curLang) {
        const pg = location.pathname.replace(/^\/(ja|mh)\//, '/')
        location.replace(savedLang === 'en' ? pg : `/${savedLang}${pg}`)
      }
    }
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#BC002D">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <nav>
    <a href="./" class="logo" lang="ja">ミニ本語</a>
    <a href="lessons/2-vocabulary.html">{{NAV_VOCABULARY}}</a>
    <a href="lessons/3-grammar.html">{{NAV_GRAMMAR}}</a>
    <a href="lessons/5-word-building.html">{{NAV_WORD_BUILDING}}</a>
    <a href="lessons/6-texts-dialogs.html">{{NAV_READING}}</a>
    <button class="nav-toggle" id="btn-furigana">{{FURIGANA_LABEL}}</button>
    <button class="nav-toggle" id="btn-theme">{{DARK_MODE_LABEL}}</button>
    {{LANG_SWITCHER}}
  </nav>

  <div id="toast-container"></div>

  <main id="content">
    <slot></slot>
  </main>

  <footer>
    <a href="https://github.com/KakkoiDev/minihongo">GitHub</a>
    <span>&copy; {{COPYRIGHT_YEAR}} KakkoiDev</span>
  </footer>

  <!--
    htmz SPA navigation
    Uses a hidden iframe to load page fragments, then swaps them into #content.
    See: https://leanrada.com/htmz/
  -->
  <script>
    const base = document.querySelector('base').href
    const basePath = new URL(base).pathname

    // -- Helpers --------------------------------------------------------

    // Set document title from the current page's <h1>
    const updateTitle = () => {
      const h1 = document.querySelector('#content h1')
      document.title = `${h1?.textContent ?? 'Minihongo'} - Minihongo`
    }

    // Replace a target element with new nodes, update title, scroll to top
    const swapContent = (nodes, target) => {
      if (!target || !nodes.length) return false
      target.replaceWith(...nodes)
      updateTitle()
      scrollTo(0, 0)
      return true
    }

    // -- htmz iframe handler --------------------------------------------

    // Called when the hidden iframe finishes loading a fragment page.
    // Extracts body nodes from the iframe and swaps them into #content.
    const onHtmzLoad = (frame) => {
      try {
        const { location: loc } = frame.contentWindow
        if (loc.href === 'about:blank') return
        setTimeout(() => {
          try {
            const target = document.querySelector(loc.hash || null)
            const nodes = [...frame.contentDocument.body.childNodes]
            if (!swapContent(nodes, target)) return
            frame.src = 'about:blank'
            // Strip the _f/ fragment prefix to get the clean page path
            const pagePath = loc.pathname.replace(basePath, '').replace(/^_f\//, '')
            const pageUrl = `${base}${pagePath}`
            if (location.href !== pageUrl) history.pushState({ path: pagePath }, '', pageUrl)
          } catch { location.reload() }
        })
      } catch { /* iframe in bad state after OS freeze/resume - ignore */ }
    }

    // -- Back/forward navigation ----------------------------------------

    // Fetch the fragment page and swap it in on history navigation
    addEventListener('popstate', async (e) => {
      if (!e.state?.path) return location.reload()
      try {
        const res = await fetch(`${base}_f/${e.state.path}`)
        if (!res.ok) throw new Error(res.status)
        const html = await res.text()
        const doc = new DOMParser().parseFromString(html, 'text/html')
        const nodes = [...doc.body.childNodes]
        if (!swapContent(nodes, document.querySelector('#content'))) location.reload()
      } catch { location.reload() }
    })

    // -- Rewrite nav links for htmz ------------------------------------

    // Point top-nav links at the hidden iframe so clicks load fragments
    for (const a of document.querySelectorAll('nav:not(.lesson-nav):not(.toc) a:not(.logo)')) {
      if (a.classList.contains('lang-link')) continue
      a.target = 'htmz'
      const path = new URL(a.href).pathname.replace(basePath, '')
      a.href = `${base}_f/${path}#content`
    }

    // -- Click delegation -----------------------------------------------

    document.addEventListener('click', (e) => {
      // Fix in-page anchor links (TOC etc.) broken by <base href>
      const anchor = e.target.closest('#content a[href^="#"]')
      if (anchor) {
        e.preventDefault()
        document.getElementById(anchor.getAttribute('href').slice(1))?.scrollIntoView()
        return
      }
      // Route lesson-nav links through the htmz iframe
      const nav = e.target.closest('.lesson-nav a')
      if (!nav) return
      e.preventDefault()
      const path = new URL(nav.href, base).pathname.replace(basePath, '')
      document.querySelector('iframe[name=htmz]').src = `${base}_f/${path}#content`
    })

    // -- Toggle buttons -------------------------------------------------

    // Toggle dark/light theme and persist choice
    document.getElementById('btn-theme').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'
      document.documentElement.dataset.theme = next
      localStorage.setItem('theme', next)
    })

    // Toggle furigana (ruby text) visibility and persist choice
    document.getElementById('btn-furigana').addEventListener('click', () => {
      const on = document.documentElement.classList.toggle('no-furigana')
      localStorage.setItem('furigana', on ? '0' : '1')
    })

    // Switch site language (en/ja/mh) - global, called from lang switcher onclick
    const switchLang = (lang) => {
      localStorage.setItem('lang', lang)
      const pagePath = location.pathname.replace(/^\/(ja|mh)\//, '/')
      location.href = lang === 'en' ? pagePath : `/${lang}${pagePath}`
    }

    // -- Service worker -------------------------------------------------

    navigator.serviceWorker?.register('/sw.js')

    // -- Content integrity recovery -------------------------------------

    // After OS freeze/resume (switching apps on mobile), the iframe and
    // #content can end up in a broken state. Detect and reload if empty.
    const checkContentIntegrity = () => {
      if (!document.querySelector('#content')?.children.length) location.reload()
    }
    addEventListener('pageshow', (e) => { if (e.persisted) checkContentIntegrity() })
    addEventListener('resume', checkContentIntegrity)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') checkContentIntegrity()
    })

    // -- Toast banner system --------------------------------------------

    // Localized toast messages (injected at build time)
    const TOAST = {
      offline: '{{TOAST_OFFLINE}}',
      online: '{{TOAST_ONLINE}}',
      install: '{{TOAST_INSTALL}}',
      installBtn: '{{TOAST_INSTALL_BTN}}',
      updated: '{{TOAST_UPDATED}}'
    }

    const toastContainer = document.getElementById('toast-container')

    // Show a toast that stacks in the fixed top container.
    // Returns the toast element for manual removal if needed.
    const showToast = (msg, opts) => {
      const el = document.createElement('div')
      el.className = 'toast'

      const msgSpan = document.createElement('span')
      msgSpan.className = 'toast-msg'
      msgSpan.textContent = msg
      el.appendChild(msgSpan)

      if (opts?.actionLabel) {
        const btn = document.createElement('button')
        btn.className = 'toast-btn'
        btn.textContent = opts.actionLabel
        btn.addEventListener('click', (e) => { e.stopPropagation(); opts.action?.() })
        el.appendChild(btn)
      }

      // Dismiss on click/tap
      const dismiss = () => {
        el.style.height = `${el.offsetHeight}px`
        el.classList.add('toast-out')
        el.addEventListener('animationend', () => {
          el.remove()
          opts?.onDismiss?.()
        }, { once: true })
      }
      el.addEventListener('click', dismiss)

      toastContainer.appendChild(el)

      // Auto-dismiss after duration
      if (opts?.duration) setTimeout(dismiss, opts.duration)

      return { el, dismiss }
    }

    // Remove all toasts (used when going back online, etc.)
    const clearToasts = () => {
      for (const el of [...toastContainer.children]) el.remove()
    }

    // Network status toasts
    let offlineToast = null
    addEventListener('offline', () => {
      offlineToast = showToast(TOAST.offline)
    })
    addEventListener('online', () => {
      offlineToast?.dismiss()
      offlineToast = null
      showToast(TOAST.online, { duration: 3000 })
    })
    if (!navigator.onLine) offlineToast = showToast(TOAST.offline)

    // -- PWA install prompt ---------------------------------------------

    // Capture the browser's install prompt and show it as a toast.
    // If dismissed, suppress for 7 days.
    let deferredInstall = null
    addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault()
      deferredInstall = e
      const dismissed = localStorage.getItem('install_dismissed')
      if (dismissed && Date.now() - Number(dismissed) < 7 * 86400000) return
      let installToast = null
      installToast = showToast(TOAST.install, {
        actionLabel: TOAST.installBtn,
        action() {
          deferredInstall?.prompt()
          deferredInstall = null
          installToast?.dismiss()
        },
        onDismiss() { localStorage.setItem('install_dismissed', Date.now()) }
      })
    })

    // Notify user when a new service worker version takes over
    navigator.serviceWorker?.addEventListener('controllerchange', () => {
      showToast(TOAST.updated, { duration: 4000 })
    })
  </script>
  <iframe hidden name="htmz" onload="onHtmzLoad(this)"></iframe>
</body>
</html>
