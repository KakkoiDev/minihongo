<!doctype html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="{{BASE_URL}}">
  <title><slot name="title">Minihongo</slot></title>
  <!-- Render-blocking: apply saved preferences before first paint to prevent flicker -->
  <script>
    // Restore theme from localStorage, default to light
    const t = localStorage.getItem('theme') ?? 'light'
    document.documentElement.dataset.theme = t
    const tc = document.querySelector('meta[name="theme-color"]')
    if (tc) tc.content = t === 'dark' ? '#1A1A1A' : '#FFFFFF'

    // Restore furigana visibility preference
    if (localStorage.getItem('furigana') === '0')
      document.documentElement.classList.add('no-furigana')

    // Redirect to stored language if on the wrong locale path
    // Skip in standalone PWA - redirects break the standalone window on resume
    const isStandalone = matchMedia('(display-mode: standalone)').matches
      || navigator.standalone
    const savedLang = localStorage.getItem('lang')
    if (!isStandalone && savedLang && /^(en|ja|mh)$/.test(savedLang)) {
      const curLang = location.pathname.startsWith('/mh/') ? 'mh'
        : location.pathname.startsWith('/ja/') ? 'ja' : 'en'
      if (savedLang !== curLang) {
        const pg = location.pathname.replace(/^\/(ja|mh)\//, '/')
        location.replace(savedLang === 'en' ? pg : `/${savedLang}${pg}`)
      }
    }
  </script>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <link rel="alternate" hreflang="en" href="{{HREFLANG_EN}}">
  <link rel="alternate" hreflang="ja" href="{{HREFLANG_JA}}">
  <link rel="alternate" hreflang="x-default" href="{{HREFLANG_EN}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=optional" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=optional"></noscript>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <nav>
    <a href="./" class="logo" lang="ja">ミニ本語</a>
    <a href="lessons/vocabulary.html">{{NAV_VOCABULARY}}</a>
    <a href="lessons/grammar.html">{{NAV_GRAMMAR}}</a>
    <a href="lessons/word-building.html">{{NAV_WORD_BUILDING}}</a>
    <a href="lessons/texts-dialogs.html">{{NAV_READING}}</a>
    <a href="lessons/going-further.html">{{NAV_GOING_FURTHER}}</a>
    <button class="nav-toggle" id="btn-furigana">{{FURIGANA_LABEL}}</button>
    <button class="nav-toggle" id="btn-theme">{{DARK_MODE_LABEL}}</button>
    {{LANG_SWITCHER}}
  </nav>

  <div id="toast-container"></div>

  <main id="content">
    <slot></slot>
  </main>

  <button class="back-to-top" id="btn-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 14.5l7-7 7 7"/></svg>
  </button>

  <button class="contact-author" id="btn-contact" aria-label="{{CONTACT_LABEL}}">
    <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
  </button>

  <dialog class="contact-dialog" id="contact-dialog">
    <form id="contact-form" method="dialog">
      <h2>{{CONTACT_HEADING}}</h2>
      <fieldset class="contact-type">
        <legend>{{CONTACT_TYPE_LABEL}}</legend>
        <label class="contact-type-option">
          <input type="radio" name="type" value="feedback" checked>
          <span>{{CONTACT_FEEDBACK}}</span>
        </label>
        <label class="contact-type-option">
          <input type="radio" name="type" value="bug">
          <span>{{CONTACT_BUG}}</span>
        </label>
      </fieldset>
      <fieldset class="contact-type">
        <legend>{{CONTACT_SEND_VIA_LABEL}}</legend>
        <label class="contact-type-option">
          <input type="radio" name="channel" value="email" checked>
          <span>{{CONTACT_EMAIL}}</span>
        </label>
        <label class="contact-type-option">
          <input type="radio" name="channel" value="github">
          <span>{{CONTACT_GITHUB}}</span>
        </label>
      </fieldset>
      <label class="contact-field">
        <span>{{CONTACT_TITLE_LABEL}}</span>
        <input type="text" name="title" required maxlength="120">
      </label>
      <label class="contact-field">
        <span>{{CONTACT_BODY_LABEL}}</span>
        <textarea name="body" required rows="6" maxlength="4000"></textarea>
      </label>
      <div class="contact-actions">
        <button type="button" class="contact-cancel">{{CONTACT_CANCEL}}</button>
        <button type="submit" class="contact-send">{{CONTACT_SEND}}</button>
      </div>
    </form>
  </dialog>

  <footer>
    <a href="https://github.com/KakkoiDev/minihongo">GitHub</a>
    <span>&copy; {{COPYRIGHT_YEAR}} KakkoiDev</span>
  </footer>

  <!-- Toast strings (build-time injected, needed before app.js) -->
  <script>
    const TOAST = {
      offline: '{{TOAST_OFFLINE}}',
      online: '{{TOAST_ONLINE}}',
      install: '{{TOAST_INSTALL}}',
      installBtn: '{{TOAST_INSTALL_BTN}}',
      updated: '{{TOAST_UPDATED}}'
    }
  </script>
  <script src="/static/app.js" defer></script>
  <script data-goatcounter="https://minihongo.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
