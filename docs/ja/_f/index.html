    <h1 lang="ja">ミニ本語</h1>
  <p>182の基本語と17の文法で、どんな概念も日本語で表現できる。</p>
  <div class="example-expressive">
    <span class="example-concept">友達</span>
    <span class="example-phrase"><span lang="ja"><ruby>好<rt>す</rt></ruby>きな<ruby>人<rt>ひと</rt></ruby></span></span>
    <span class="example-concept">医者</span>
    <span class="example-phrase"><span lang="ja"><ruby>体<rt>からだ</rt></ruby>を<ruby>助<rt>たす</rt></ruby>ける<ruby>人<rt>ひと</rt></ruby></span></span>
    <span class="example-concept">自由</span>
    <span class="example-phrase"><span lang="ja"><ruby>好<rt>す</rt></ruby>きにできる<ruby>事<rt>こと</rt></ruby></span></span>

  <ul>
    <li>182の基本語（名詞・動詞・形容詞）</li>
    <li>17の文法で完全な文を作れる</li>
    <li>182から作る167の複合語</li>
  </ul>
